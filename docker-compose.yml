services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/nginx/certs:ro
      - diamond_frontend:/app/diamond-frontend:ro
    networks:
      - web-network
    restart: always

  mariadb:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - web-network
    restart: always

networks:
  web-network:
    name: web-network
    driver: bridge

volumes:
  db_data:
  diamond_frontend:
    external: true
    name: diamond-inventory_frontend_dist
